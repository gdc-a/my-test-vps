<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="shortcut icon" type="image/x-icon" href="../favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Gupta Dental Care</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-main, #0f172a);
            color: var(--text-main, #f8fafc);
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: var(--bg-surface, #1e293b);
            border: 1px solid var(--border-glass, rgba(255, 255, 255, 0.1));
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        .login-card .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass, rgba(255, 255, 255, 0.1));
            color: var(--text-main, #f8fafc);
            border-radius: 10px;
            padding: 12px;
        }
        .login-card .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            border-color: var(--primary, #0ea5e9);
        }
        .login-card .input-group-text {
            border: 1px solid var(--border-glass, rgba(255, 255, 255, 0.1));
            color: #94a3b8;
        }
        body.light-mode {
            background: #f8fafc;
        }
        body.light-mode .login-card {
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-color: #e2e8f0;
        }
        body.light-mode .login-card .form-control {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
        }
        body.light-mode .input-group-text {
            border-color: #cbd5e1;
            color: #64748b;
        }
        body.light-mode p.text-muted {
            color: #64748b !important;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="../logo.png" alt="Logo" style="height: 70px; object-fit: contain;" class="mb-3 shadow-sm">
            <h4 class="fw-bold">Admin Portal</h4>
            <p class="text-muted small">Sign in to manage the gallery</p>
        </div>
        <form id="loginForm">
            <div id="errorMsg" class="alert alert-danger d-none small py-2 mb-3"><i class="fas fa-exclamation-circle me-1"></i> Invalid credentials</div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Email address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control border-start-0" required placeholder="admin@example.com">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control border-start-0" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="border-radius: 10px;">
                <i class="fas fa-sign-in-alt me-2"></i> Log In
            </button>
        </form>
        <div class="text-center mt-3">
             <a href="../" class="text-decoration-none small text-muted"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </div>

    <script src="../admin.js"></script>
</body>

</html>
